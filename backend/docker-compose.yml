version: "3.9"

services:
  stock-api:
    build: .
    container_name: stock_dashboard
    ports:
      - "8000:8000"
    volumes:
      # Persist DB and CSV so data survives container restarts
      - ./data:/app/data
      - ./backend/database.db:/app/backend/database.db
    environment:
      - PYTHONUNBUFFERED=1
      # Optional: set your NewsAPI key for live sentiment headlines
      # - NEWSAPI_KEY=your_key_here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give the data pipeline time to finish
    restart: unless-stopped
